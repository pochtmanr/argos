# /Users/roman/Developer/iosbrowser/apps/macos/project.yml
name: MacBrowser
options:
  bundleIdPrefix: com.iosbrowser
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  BrowserCore:
    path: ../../packages/BrowserCore
targets:
  MacBrowser:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: BrowserCore
        product: BrowserCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosbrowser.macos
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Argos
        CFBundleName: Argos
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Argos — a personal daily-driver browser."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
